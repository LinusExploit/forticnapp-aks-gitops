# SecretProviderClass syncs the FortiCNAPP access token from Azure Key Vault
# `cnaptoken` (resource group: `secrets`) into a Kubernetes Secret named
# `lacework-agent-token` (key: accessToken). The HelmRelease references that
# Secret via valuesFrom.
#
# Replace the remaining placeholder with values from `terraform output`:
#   <CSI_CLIENT_ID>  -> kv_secrets_provider_object_id (terraform output)
#   <TENANT_ID>      -> az account show --query tenantId -o tsv
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: lacework-agent-kv
  namespace: lacework-agent
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "08978c51-b7e8-4ebf-9fc3-fc814ac90bc3"
    keyvaultName: "cnaptoken"
    tenantId: "53e0a75a-6c5d-47a8-ab9f-3259112ca3d0"
    objects: |
      array:
        - |
          objectName: token
          objectType: secret
          objectAlias: accessToken
  secretObjects:
    - secretName: lacework-agent-token
      type: Opaque
      data:
        - objectName: accessToken
          key: accessToken

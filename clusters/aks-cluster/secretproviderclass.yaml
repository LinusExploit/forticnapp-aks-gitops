# SecretProviderClass syncs the FortiCNAPP access token from Azure Key Vault
# into a Kubernetes Secret named `lacework-agent-token` (key: accessToken).
# The HelmRelease references that Secret via valuesFrom.
#
# Replace the placeholders below with values from `terraform output`:
#   <KV_NAME>        -> key_vault_name (terraform.tfvars)
#   <TENANT_ID>      -> az account show --query tenantId -o tsv
#   <CSI_CLIENT_ID>  -> kv_secrets_provider_object_id (terraform output)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: lacework-agent-kv
  namespace: lacework-agent
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<CSI_CLIENT_ID>"
    keyvaultName: "<KV_NAME>"
    tenantId: "<TENANT_ID>"
    objects: |
      array:
        - |
          objectName: lacework-access-token
          objectType: secret
          objectAlias: accessToken
  secretObjects:
    - secretName: lacework-agent-token
      type: Opaque
      data:
        - objectName: accessToken
          key: accessToken

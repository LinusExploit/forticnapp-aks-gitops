# SecretProviderClass — Workload Identity mode.
#
# Syncs the FortiCNAPP access token from Azure Key Vault `cnaptoken`
# (resource group: `secrets`) into a Kubernetes Secret named
# `lacework-agent-token` (key: accessToken). The HelmRelease references
# that Secret via valuesFrom.
#
# Authentication uses Workload Identity:
#   - The CSI driver authenticates as the lacework-csi-sa ServiceAccount.
#   - That SA is bound (via the annotation in namespace.yaml) to the
#     externally-managed UAMI in the `secrets` resource group.
#   - The UAMI's client_id is referenced as `clientID` below — it is
#     STABLE across all AKS clusters and rebuilds, so this YAML is
#     fully cluster-agnostic.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: lacework-agent-kv
  namespace: lacework-agent
spec:
  provider: azure
  parameters:
    clientID: "9bcecf56-bb5e-4ef5-b43d-f3a41f26bd81"
    keyvaultName: "cnaptoken"
    tenantId: "53e0a75a-6c5d-47a8-ab9f-3259112ca3d0"
    objects: |
      array:
        - |
          objectName: token
          objectType: secret
          objectAlias: accessToken
  secretObjects:
    - secretName: lacework-agent-token
      type: Opaque
      data:
        - objectName: accessToken
          key: accessToken
